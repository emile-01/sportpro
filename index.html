<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite Match Predictor</title>

<style>
:root{
--primary:#2563eb;
--secondary:#0f172a;
--accent:#10b981;
--bg:#f8fafc;
--card:#ffffff;
}

body{
font-family:Inter,sans-serif;
background:var(--bg);
color:var(--secondary);
margin:0;
padding:20px;
}

.container{max-width:1000px;margin:0 auto;}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

@media(max-width:768px){
.grid{grid-template-columns:1fr;}
}

.card{
background:var(--card);
border-radius:12px;
padding:20px;
box-shadow:0 4px 6px -1px rgba(0,0,0,0.1);
border:1px solid #e2e8f0;
}

h3{
margin-top:0;
border-bottom:2px solid #f1f5f9;
padding-bottom:10px;
font-size:1.1rem;
}

.field-group{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-bottom:15px;
}

label{
font-size:0.7rem;
font-weight:700;
text-transform:uppercase;
color:#64748b;
}

input,select{
width:100%;
padding:10px;
border:1px solid #cbd5e1;
border-radius:6px;
box-sizing:border-box;
}

.analyze-btn{
width:100%;
background:var(--primary);
color:white;
border:none;
padding:18px;
border-radius:8px;
font-weight:800;
cursor:pointer;
font-size:1rem;
margin-top:10px;
}

#loaderOverlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:var(--secondary);
display:none;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:2000;
color:white;
}

.progress-bar{
width:200px;
height:4px;
background:#334155;
border-radius:10px;
margin-top:15px;
overflow:hidden;
}

.progress-fill{
height:100%;
background:var(--primary);
width:0%;
transition:width .1s linear;
}

#resultOverlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(15,23,42,.98);
display:none;
align-items:center;
justify-content:center;
z-index:1000;
overflow-y:auto;
}

.result-modal{
background:white;
width:90%;
max-width:550px;
border-radius:16px;
padding:30px;
position:relative;
}

.close-x{
position:absolute;
top:15px;
right:20px;
font-size:28px;
cursor:pointer;
color:#94a3b8;
}

.stat-item{
display:flex;
justify-content:space-between;
padding:12px 0;
border-bottom:1px solid #f1f5f9;
}

.stat-label{font-weight:600;}

.stat-value{
font-weight:800;
color:var(--primary);
}

.score-pill{
background:#f1f5f9;
padding:8px 15px;
border-radius:20px;
display:inline-block;
margin:5px;
font-weight:800;
border:1px solid #e2e8f0;
}

.recommendation{
background:#ecfdf5;
border:1px dashed var(--accent);
padding:15px;
border-radius:8px;
margin-top:20px;
}
</style>
</head>

<body>

<div class="container">

<h2 style="text-align:center;">⚽⚽football predictor⚽⚽</h2>

<div class="grid">

<div class="card">

<h3>🏠 Team A (Home)</h3>

<div class="field-group">
<div><label>H2H Wins (L5)</label><input type="number" id="a_h2h" value="3"></div>
<div><label>Recent Wins (L5)</label><input type="number" id="a_form" value="4"></div>
</div>

<div class="field-group">
<div><label>Avg Scored (L3)</label><input type="number" id="a_att" step="0.1" value="2.1"></div>
<div><label>Avg Conceded (L3)</label><input type="number" id="a_def" step="0.1" value="0.9"></div>
</div>

<div class="field-group">
<div><label>Key Player?</label>
<select id="a_key">
<option value="1">Yes</option>
<option value="0">No</option>
</select></div>

<div><label>Coach System</label>
<select id="a_sys">
<option value="0.2">4-3-3 (Att)</option>
<option value="0">4-4-2 (Bal)</option>
<option value="-0.2">5-4-1 (Def)</option>
</select></div>
</div>

</div>

<div class="card">

<h3>🚩 Team B (Away)</h3>

<div class="field-group">
<div><label>H2H Wins (L5)</label><input type="number" id="b_h2h" value="1"></div>
<div><label>Recent Wins (L5)</label><input type="number" id="b_form" value="2"></div>
</div>

<div class="field-group">
<div><label>Avg Scored (L3)</label><input type="number" id="b_att" step="0.1" value="1.2"></div>
<div><label>Avg Conceded (L3)</label><input type="number" id="b_def" step="0.1" value="1.8"></div>
</div>

<div class="field-group">
<div><label>Key Player?</label>
<select id="b_key">
<option value="1">Yes</option>
<option value="0">No</option>
</select></div>

<div><label>Coach System</label>
<select id="b_sys">
<option value="0.2">4-3-3</option>
<option value="0">4-4-2</option>
<option value="-0.2">5-4-1</option>
</select></div>
</div>

</div>

</div>

<div class="card" style="margin-top:20px;">

<h3>🌍 Match Context</h3>

<div class="field-group" style="grid-template-columns:repeat(3,1fr);">

<div>
<label>Weather</label>
<select id="weather">
<option value="good">Good</option>
<option value="bad">Bad</option>
</select>
</div>

<div><label>A - Trophies</label><input type="number" id="a_titles" value="1"></div>

<div><label>B - Trophies</label><input type="number" id="b_titles" value="0"></div>

</div>

<button class="analyze-btn" onclick="startAnalysis()">GENERATE PREDICTION</button>

</div>

</div>


<div id="loaderOverlay">
<h2>Analyzing Match...</h2>
<div id="percentageText" style="font-size:2rem;font-weight:800;">0%</div>
<div class="progress-bar"><div class="progress-fill" id="pFill"></div></div>
</div>


<div id="resultOverlay">
<div class="result-modal">

<span class="close-x" onclick="closeResults()">×</span>

<h2>Prediction Report</h2>

<div class="stat-item"><span class="stat-label">Win Probability</span><span class="stat-value" id="res_win"></span></div>

<div class="stat-item"><span class="stat-label">Expected Goals</span><span class="stat-value" id="res_exG"></span></div>

<div class="stat-item"><span class="stat-label">Over 2.5 Goals</span><span class="stat-value" id="res_over"></span></div>

<h3 style="margin-top:25px;">Correct Score Predictions</h3>

<div id="scorePredictions"></div>

<div class="recommendation">
<b>Recommended Picks</b>
<p id="res_pick"></p>
</div>

</div>
</div>


<script>

function factorial(n){return n<=1?1:n*factorial(n-1)}

function poisson(lambda,k){
return(Math.pow(lambda,k)*Math.exp(-lambda))/factorial(k)
}

function startAnalysis(){

const loader=document.getElementById('loaderOverlay')
const fill=document.getElementById('pFill')
const txt=document.getElementById('percentageText')

loader.style.display='flex'

let progress=0

const interval=setInterval(()=>{

progress+=5
fill.style.width=progress+"%"
txt.innerText=progress+"%"

if(progress>=100){
clearInterval(interval)

setTimeout(()=>{
loader.style.display='none'
calculateResults()
},300)

}

},80)

}

function calculateResults(){

const A={
att:parseFloat(a_att.value),
def:parseFloat(a_def.value),
h2h:parseInt(a_h2h.value)/5,
form:parseInt(a_form.value)/5,
key:parseInt(a_key.value),
sys:parseFloat(a_sys.value),
titles:parseInt(a_titles.value)
}

const B={
att:parseFloat(b_att.value),
def:parseFloat(b_def.value),
h2h:parseInt(b_h2h.value)/5,
form:parseInt(b_form.value)/5,
key:parseInt(b_key.value),
sys:parseFloat(b_sys.value),
titles:parseInt(b_titles.value)
}

const weather=document.getElementById("weather").value==="bad"?-0.2:0


let lambdaA=
(A.att*0.6+B.def*0.4)+
(A.form*0.5)+
(A.h2h*0.3)+
(A.key*0.15)+
(A.sys)+
(A.titles*0.03)+
weather


let lambdaB=
(B.att*0.6+A.def*0.4)+
(B.form*0.5)+
(B.h2h*0.3)+
(B.key*0.15)+
(B.sys)+
(B.titles*0.03)+
weather


lambdaA=Math.max(.2,Math.min(lambdaA,3.5))
lambdaB=Math.max(.2,Math.min(lambdaB,3.5))

const totalExG=lambdaA+lambdaB


let scores=[]
let home=0
let away=0
let draw=0
let over25=0


for(let a=0;a<=6;a++){

for(let b=0;b<=6;b++){

let p=poisson(lambdaA,a)*poisson(lambdaB,b)

scores.push({score:`${a} - ${b}`,prob:p})

if(a>b)home+=p
else if(b>a)away+=p
else draw+=p

if(a+b>2.5)over25+=p

}

}


scores.sort((a,b)=>b.prob-a.prob)


const probHome=home*100
const probAway=away*100
const probDraw=draw*100
const probOver=over25*100


res_win.innerText=
`Home ${probHome.toFixed(1)}% | Draw ${probDraw.toFixed(1)}% | Away ${probAway.toFixed(1)}%`

res_exG.innerText=totalExG.toFixed(2)

res_over.innerText=probOver.toFixed(1)+"%"


const scoreContainer=document.getElementById("scorePredictions")

scoreContainer.innerHTML=""

scores.slice(0,3).forEach(s=>{
scoreContainer.innerHTML+=
`<div class="score-pill">${s.score} (${(s.prob*100).toFixed(1)}%)</div>`
})


let picks=[]

if(probHome>55)picks.push("Home Win")
else if(probAway>55)picks.push("Away Win")
else picks.push("Double Chance")

if(probOver>60)picks.push("Over 2.5 Goals")
if(probOver<40)picks.push("Under 2.5 Goals")

if(totalExG>3)picks.push("BTTS Yes")

res_pick.innerHTML="• "+picks.join("<br>• ")

resultOverlay.style.display="flex"

}

function closeResults(){
resultOverlay.style.display="none"
}

</script>

</body>
</html>
