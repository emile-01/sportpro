<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Match Predictor</title>
    <style>
        :root {
            --primary: #2563eb; --secondary: #0f172a; --accent: #10b981;
            --bg: #f8fafc; --card: #ffffff;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--secondary); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
        
        .card { background: var(--card); border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        h3 { margin-top: 0; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; font-size: 1.1rem; }
        
        .field-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; color: #64748b; }
        input, select { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }

        .analyze-btn { width: 100%; background: var(--primary); color: white; border: none; padding: 18px; border-radius: 8px; font-weight: 800; cursor: pointer; font-size: 1rem; margin-top: 10px; transition: 0.3s; }
        
        /* Loading Screen Overlay */
        #loaderOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--secondary); display: none; flex-direction: column;
            align-items: center; justify-content: center; z-index: 2000; color: white;
        }
        .progress-bar { width: 200px; height: 4px; background: #334155; border-radius: 10px; margin-top: 15px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.1s linear; }

        /* Results Screen Overlay */
        #resultOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.98); display: none; align-items: center; justify-content: center; z-index: 1000; overflow-y: auto;
        }
        .result-modal { background: white; width: 90%; max-width: 550px; border-radius: 16px; padding: 30px; position: relative; }
        .close-x { position: absolute; top: 15px; right: 20px; font-size: 28px; cursor: pointer; color: #94a3b8; }
        
        .stat-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f1f5f9; }
        .stat-label { font-weight: 600; }
        .stat-value { font-weight: 800; color: var(--primary); }
        .score-pill { background: #f1f5f9; padding: 8px 15px; border-radius: 20px; display: inline-block; margin: 5px; font-weight: 800; border: 1px solid #e2e8f0; }
        .recommendation { background: #ecfdf5; border: 1px dashed var(--accent); padding: 15px; border-radius: 8px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center; color: var(--secondary);">Match Intelligence Dashboard</h2>
    <div class="grid">
        <div class="card">
            <h3>🏠 Team A (Home)</h3>
            <div class="field-group">
                <div><label>H2H Wins (L5)</label><input type="number" id="a_h2h" value="3"></div>
                <div><label>Recent Wins (L5)</label><input type="number" id="a_form" value="4"></div>
            </div>
            <div class="field-group">
                <div><label>Avg Scored (L3)</label><input type="number" id="a_att" step="0.1" value="2.1"></div>
                <div><label>Avg Conceded (L3)</label><input type="number" id="a_def" step="0.1" value="0.9"></div>
            </div>
            <div class="field-group">
                <div><label>Key Player?</label><select id="a_key"><option value="1">Yes</option><option value="0">No</option></select></div>
                <div><label>Coach System</label><select id="a_sys"><option value="0.2">4-3-3 (Att)</option><option value="0">4-4-2 (Bal)</option><option value="-0.2">5-4-1 (Def)</option></select></div>
            </div>
        </div>

        <div class="card">
            <h3>🚩 Team B (Away)</h3>
            <div class="field-group">
                <div><label>H2H Wins (L5)</label><input type="number" id="b_h2h" value="1"></div>
                <div><label>Recent Wins (L5)</label><input type="number" id="b_form" value="2"></div>
            </div>
            <div class="field-group">
                <div><label>Avg Scored (L3)</label><input type="number" id="b_att" step="0.1" value="1.2"></div>
                <div><label>Avg Conceded (L3)</label><input type="number" id="b_def" step="0.1" value="1.8"></div>
            </div>
            <div class="field-group">
                <div><label>Key Player?</label><select id="b_key"><option value="1">Yes</option><option value="0">No</option></select></div>
                <div><label>Coach System</label><select id="b_sys"><option value="0.2">4-3-3 (Att)</option><option value="0">4-4-2 (Bal)</option><option value="-0.2">5-4-1 (Def)</option></select></div>
            </div>
        </div>
    </div>

    <div class="card" style="margin-top:20px;">
        <h3>🌍 Match Context</h3>
        <div class="field-group" style="grid-template-columns: repeat(3, 1fr);">
            <div><label>Weather</label><select id="weather"><option value="good">Good</option><option value="bad">Bad</option></select></div>
            <div><label>A - Trophies</label><input type="number" id="a_titles" value="1"></div>
            <div><label>B - Trophies</label><input type="number" id="b_titles" value="0"></div>
        </div>
        <button class="analyze-btn" onclick="startAnalysis()">GENERATE PREDICTION</button>
    </div>
</div>

<div id="loaderOverlay">
    <h2 id="loadText">Initializing Data...</h2>
    <div id="percentageText" style="font-size: 2rem; font-weight: 800;">0%</div>
    <div class="progress-bar"><div class="progress-fill" id="pFill"></div></div>
</div>

<div id="resultOverlay">
    <div class="result-modal">
        <span class="close-x" onclick="closeResults()">&times;</span>
        <h2 style="margin-top:0; color: var(--secondary);">Prediction Report</h2>
        
        <div class="stat-item"><span class="stat-label">Win Probability (1X2)</span><span class="stat-value" id="res_win">--</span></div>
        <div class="stat-item"><span class="stat-label">Expected Total Goals E(G)</span><span class="stat-value" id="res_exG">--</span></div>
        <div class="stat-item"><span class="stat-label">Over 2.5 Goals Probability</span><span class="stat-value" id="res_over">--</span></div>

        <h3 style="margin-top:25px;">🎯 Correct Score Predictions</h3>
        <div id="scorePredictions"></div>

        <div class="recommendation">
            <span style="font-weight: 800; color: #065f46;">💎 RECOMMENDED PICKS</span>
            <p id="res_pick" style="margin: 5px 0 0 0; font-size: 0.9rem;"></p>
        </div>
    </div>
</div>

<script>
// --- Math Functions ---
function factorial(n) { return n <= 1 ? 1 : n * factorial(n - 1); }
function poisson(lambda, k) { return (Math.pow(lambda, k) * Math.exp(-lambda)) / factorial(k); }

function startAnalysis() {
    const loader = document.getElementById('loaderOverlay');
    const fill = document.getElementById('pFill');
    const percentTxt = document.getElementById('percentageText');
    
    loader.style.display = 'flex';
    let progress = 0;
    
    const interval = setInterval(() => {
        progress += 5;
        fill.style.width = progress + "%";
        percentTxt.innerText = progress + "%";
        
        if (progress >= 100) {
            clearInterval(interval);
            setTimeout(() => {
                loader.style.display = 'none';
                calculateResults();
            }, 300);
        }
    }, 100);
}

function calculateResults() {
    // Collect Inputs
    const A = { att: parseFloat(document.getElementById('a_att').value), def: parseFloat(document.getElementById('a_def').value), h2h: parseInt(document.getElementById('a_h2h').value)/5, form: parseInt(document.getElementById('a_form').value)/5, key: parseInt(document.getElementById('a_key').value), sys: parseFloat(document.getElementById('a_sys').value) };
    const B = { att: parseFloat(document.getElementById('b_att').value), def: parseFloat(document.getElementById('b_def').value), h2h: parseInt(document.getElementById('b_h2h').value)/5, form: parseInt(document.getElementById('b_form').value)/5, key: parseInt(document.getElementById('b_key').value), sys: parseFloat(document.getElementById('b_sys').value) };
    const weather = document.getElementById('weather').value === 'bad' ? -0.3 : 0;

    // 1. Expected Goals for each team
    // Formula: E(G) = (My Att + Their Def Weakness) / 2 + Weather + System
    const lambdaA = (A.att + (B.def * 0.5)) + (weather/2) + A.sys;
    const lambdaB = (B.att + (A.def * 0.5)) + (weather/2) + B.sys;
    const totalExG = lambdaA + lambdaB;

    // 2. Win Prob (1X2)
    const alpha=0.3, beta=0.25, gamma=0.25, delta=0.15, theta=0.05;
    const scoreA = (A.form*alpha + A.h2h*beta + (A.att/4)*gamma - (B.def/4)*delta + A.key*theta);
    const scoreB = (B.form*alpha + B.h2h*beta + (B.att/4)*gamma - (A.def/4)*delta + B.key*theta);
    const probA = (scoreA / (scoreA + scoreB)) * 100;

    // 3. Over 2.5 Prob
    const probOver = (1 - Math.exp(-totalExG / 2.5)) * 100;

    // 4. Poisson Correct Scores
    let scores = [];
    for(let a=0; a<=3; a++) {
        for(let b=0; b<=3; b++) {
            let p = poisson(lambdaA, a) * poisson(lambdaB, b);
            scores.push({ score: `${a} - ${b}`, prob: p });
        }
    }
    scores.sort((a, b) => b.prob - a.prob);

    // Update UI
    document.getElementById('res_win').innerText = `Home: ${probA.toFixed(1)}% | Away: ${(100-probA).toFixed(1)}%`;
    document.getElementById('res_exG').innerText = totalExG.toFixed(2);
    document.getElementById('res_over').innerText = probOver.toFixed(1) + "%";
    
    const scoreContainer = document.getElementById('scorePredictions');
    scoreContainer.innerHTML = "";
    scores.slice(0, 3).forEach(s => {
        scoreContainer.innerHTML += `<div class="score-pill">${s.score} (${(s.prob*100).toFixed(1)}%)</div>`;
    });

    // Picks
    let picks = [];
    if(probA > 60) picks.push("Home Win (Strong Form/H2H)");
    else if(probA < 40) picks.push("Away Win (Team B Advantage)");
    else picks.push("Double Chance (Balanced Match)");
    
    if(probOver > 60) picks.push("Over 2.5 Goals (High Expected Scoring)");
    else picks.push("Under 3.5 Goals (Defensive Stability)");

    document.getElementById('res_pick').innerHTML = "• " + picks.join("<br>• ");
    document.getElementById('resultOverlay').style.display = 'flex';
}

function closeResults() { document.getElementById('resultOverlay').style.display = 'none'; }
</script>
</body>
</html>
